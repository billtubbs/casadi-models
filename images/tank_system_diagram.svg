<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <!-- White background -->
  <rect width="500" height="600" fill="white"/>

  <!-- Tank outline (cylindrical side view) -->
  <line x1="150" y1="150" x2="150" y2="450" stroke="black" stroke-width="1.5"/>
  <line x1="350" y1="150" x2="350" y2="450" stroke="black" stroke-width="1.5"/>
  <ellipse cx="250" cy="150" rx="100" ry="20" fill="none" stroke="black" stroke-width="1.5"/>
  <ellipse cx="250" cy="450" rx="100" ry="20" fill="none" stroke="black" stroke-width="1.5"/>

  <!-- Liquid volume (filled with light grey) -->
  <!-- Bottom ellipse -->
  <ellipse cx="250" cy="450" rx="100" ry="20" fill="lightgrey"/>
  <!-- Rectangle for the body -->
  <rect x="150" y="300" width="200" height="150" fill="lightgrey"/>
  <!-- Top surface ellipse (filled) -->
  <ellipse cx="250" cy="300" rx="100" ry="20" fill="lightgrey"/>

  <!-- Water level line (ellipse with dotted lines) -->
  <ellipse cx="250" cy="300" rx="100" ry="20" fill="none" stroke="black" stroke-width="1.5" stroke-dasharray="5,5"/>

  <!-- Level indicator with dimension line -->
  <line x1="370" y1="450" x2="370" y2="300" stroke="black" stroke-width="1"/>
  <line x1="365" y1="450" x2="375" y2="450" stroke="black" stroke-width="1"/>
  <line x1="365" y1="300" x2="375" y2="300" stroke="black" stroke-width="1"/>
  <text x="385" y="380" font-family="Arial" font-size="16" fill="black">L(t)</text>

  <!-- Diameter indicator (raised above tank) -->
  <line x1="150" y1="110" x2="350" y2="110" stroke="black" stroke-width="1"/>
  <line x1="150" y1="105" x2="150" y2="115" stroke="black" stroke-width="1"/>
  <line x1="350" y1="105" x2="350" y2="115" stroke="black" stroke-width="1"/>
  <text x="235" y="100" font-family="Arial" font-size="16" fill="black">D</text>

  <!-- Hot water inlet (F_h) - from top left -->
  <line x1="50" y1="200" x2="142" y2="200" stroke="black" stroke-width="2"/>
  <polygon points="142,200 130,195 130,205" fill="black"/>
  <text x="20" y="190" font-family="Arial" font-size="14" fill="black">F<tspan font-size="11" baseline-shift="sub">h</tspan>(t)</text>
  <text x="20" y="210" font-family="Arial" font-size="14" fill="black">T<tspan font-size="11" baseline-shift="sub">h</tspan></text>

  <!-- Cold water inlet (F_c) - from top right -->
  <line x1="450" y1="250" x2="358" y2="250" stroke="black" stroke-width="2"/>
  <polygon points="358,250 370,245 370,255" fill="black"/>
  <text x="455" y="245" font-family="Arial" font-size="14" fill="black">F<tspan font-size="11" baseline-shift="sub">c</tspan>(t)</text>
  <text x="455" y="265" font-family="Arial" font-size="14" fill="black">T<tspan font-size="11" baseline-shift="sub">c</tspan></text>

  <!-- Outlet (F_out) - from bottom -->
  <line x1="250" y1="470" x2="250" y2="552" stroke="black" stroke-width="2"/>
  <polygon points="250,552 245,540 255,540" fill="black"/>
  <text x="260" y="515" font-family="Arial" font-size="14" fill="black">F<tspan font-size="11" baseline-shift="sub">out</tspan>(t)</text>
  <text x="260" y="535" font-family="Arial" font-size="14" fill="black">T<tspan font-size="11" baseline-shift="sub">out</tspan>(t)</text>

  <!-- Tank temperature label (centered in liquid volume) -->
  <text x="220" y="380" font-family="Arial" font-size="14" fill="black">T<tspan font-size="11" baseline-shift="sub">out</tspan>(t)</text>

  <!-- Title -->
  <text x="250" y="40" font-family="Arial" font-size="18" fill="black" text-anchor="middle" font-weight="bold">Cylindrical Tank System</text>

  <!-- Area notation -->
  <text x="250" y="70" font-family="Arial" font-size="14" fill="black" text-anchor="middle">A = πD²/4</text>
</svg>
